[package]
name = "taffeite"
version = "0.1.0"
edition = "2024"

[dependencies]
# Core Dioxus setup
# Keep the base renderer feature unopinionated so desktop, web, and server
# can be enabled independently through crate features.
dioxus = { version = "0.8.0-alpha.0", features = ["router"] }
dioxus-logger = "0.6.0"
dotenvy = "0.15"

# Serialization & Async
serde = { version = "1.0.228", features = ["derive"] }
futures-util = "0.3"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.52.3", default-features = false, features = ["rt-multi-thread", "macros", "sync", "time", "fs", "io-util"], optional = true }

# Database layer 
# REMOVED default-features = false from mongodb to stop internal compilation failures
mongodb = { version = "3.7.0", optional = true }
bson = { version = "2.15.0", features = [
    "chrono-0_4",
    "uuid-1",
], default-features = false }
log = "0.4"

[features]
default = []
fullstack = ["dioxus/fullstack"]
desktop = ["dioxus/desktop"]
web = ["dioxus/web", "fullstack"]
server = ["fullstack", "dioxus/server", "dep:tokio", "dep:mongodb"]

[profile.dev]
debug = true
split-debuginfo = "packed"
opt-level = 0
strip = false

[profile.wasm-dev]
inherits = "dev"
opt-level = 0
debug = true

[profile.server-dev]
inherits = "dev"
opt-level = 0
debug = true
split-debuginfo = "packed"
strip = false

[profile.android-dev]
inherits = "dev"
opt-level = 0
debug = true
